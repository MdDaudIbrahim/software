<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gesture Controlled 3D Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
            transform: scaleX(-1); /* Mirror the video preview */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        p { font-size: 0.9rem; color: #aaa; margin-top: 5px; }
        .instruction {
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .key { color: #4deeea; font-weight: bold; }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #4deeea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div>Loading AI Vision Models...</div>
</div>

<div id="ui">
    <h1>Particle Morph</h1>
    <p>Move hand to rotate & change color.</p>
    <div class="instruction">
        <div><span class="key">1 Finger:</span> Sphere</div>
        <div><span class="key">2 Fingers:</span> Galaxy Spiral</div>
        <div><span class="key">3 Fingers:</span> Saturn</div>
        <div><span class="key">4 Fingers:</span> 3D Flower</div>
        <div><span class="key">5 Fingers:</span> Heart</div>
        <div style="margin-top:8px; border-top:1px solid #444; padding-top:5px;">
            <span class="key">Pinch:</span> Explode/Contract
        </div>
    </div>
</div>

<div id="video-container">
    <video id="webcam" playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
    // --- Configuration ---
    const PARTICLE_COUNT = 30000;
    const PARTICLE_SIZE = 0.08;
    const LERP_SPEED = 0.08; // How fast particles fly to new shapes

    // --- State ---
    let targetShape = 'sphere';
    let expansionFactor = 1.0;
    let handCentroid = { x: 0.5, y: 0.5 };
    let hueOffset = 0.0;
    
    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.02);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- Particle System Setup ---
    const geometry = new THREE.BufferGeometry();
    
    // Arrays for attributes
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);

    // Initialize logic
    const colorObj = new THREE.Color();
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        // Start at random positions
        positions[i * 3] = (Math.random() - 0.5) * 10;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

        sizes[i] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Custom Shader Material for performant rendering
    const material = new THREE.ShaderMaterial({
        uniforms: {
            pointTexture: { value: new THREE.TextureLoader().load("https://assets.codepen.io/127738/dotTexture.png") },
            globalSize: { value: PARTICLE_SIZE }
        },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            uniform float globalSize;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = globalSize * size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D pointTexture;
            varying vec3 vColor;
            void main() {
                gl_FragColor = vec4(vColor, 1.0);
                gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
            }
        `,
        blending: THREE.AdditiveBlending,
        depthTest: false,
        transparent: true
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    // --- Shape Generators ---
    // These functions fill the 'targetPositions' array
    
    const generators = {
        sphere: () => {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const r = 2.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                targetPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i * 3 + 2] = r * Math.cos(phi);
            }
        },
        spiral: () => {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = i * 0.005;
                const r = i * 0.00015 * 3;
                // Add some thickness/randomness
                const spread = (Math.random() - 0.5) * 0.5;
                targetPositions[i * 3] = (r * Math.cos(angle * 5)) * 4 + spread;
                targetPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.5; // Flattened y
                targetPositions[i * 3 + 2] = (r * Math.sin(angle * 5)) * 4 + spread;
            }
        },
        saturn: () => {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // 30% Planet, 70% Rings
                if (i < PARTICLE_COUNT * 0.3) {
                    // Planet
                    const r = 1.2;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    targetPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i * 3 + 2] = r * Math.cos(phi);
                } else {
                    // Rings
                    const angle = Math.random() * Math.PI * 2;
                    const minR = 1.8;
                    const maxR = 3.5;
                    const r = minR + Math.random() * (maxR - minR);
                    targetPositions[i * 3] = r * Math.cos(angle);
                    targetPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.1; // Very thin
                    targetPositions[i * 3 + 2] = r * Math.sin(angle);
                }
            }
        },
        flower: () => {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
               const u = Math.random() * Math.PI * 2;
               const v = Math.random() * Math.PI;
               // Rose/Flower math
               const r = 2 * Math.sin(3 * u) * Math.sin(v); 
               targetPositions[i * 3] = r * Math.sin(v) * Math.cos(u) * 1.5;
               targetPositions[i * 3 + 1] = r * Math.sin(v) * Math.sin(u) * 1.5;
               targetPositions[i * 3 + 2] = r * Math.cos(v) * 1.5;
            }
        },
        heart: () => {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Heart Surface parametric
                // We distribute points randomly inside a volume or on surface
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                
                // Variation of heart formula
                const x = 16 * Math.pow(Math.sin(theta), 3) * Math.cos(phi);
                const y = 13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta);
                const z = 16 * Math.pow(Math.sin(theta), 3) * Math.sin(phi);
                
                // Scale down
                targetPositions[i * 3] = x * 0.15;
                targetPositions[i * 3 + 1] = y * 0.15 + 0.5; // Offset y to center
                targetPositions[i * 3 + 2] = z * 0.15;
            }
        }
    };

    // Initialize first shape
    generators['sphere']();

    // --- MediaPipe Hands Setup ---
    const videoElement = document.getElementById('webcam');
    
    function onResults(results) {
        document.getElementById('loading').style.display = 'none';

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            // 1. Calculate Hand Centroid (for rotation/color)
            // Wrist (0), Middle Finger MCP (9)
            let cx = landmarks[9].x;
            let cy = landmarks[9].y;
            // Smooth lerp for camera/rotation interaction
            handCentroid.x += (cx - handCentroid.x) * 0.1;
            handCentroid.y += (cy - handCentroid.y) * 0.1;

            // 2. Count Fingers (for Shape Switching)
            // Tips: 8(Index), 12(Middle), 16(Ring), 20(Pinky)
            // Bases: 5, 9, 13, 17
            // Thumb is tricky, we check if tip is to the right/left of knucle depending on hand
            
            let fingersUp = 0;
            // Check Index, Middle, Ring, Pinky (y coordinate is smaller than base means up in MP coords)
            if (landmarks[8].y < landmarks[5].y) fingersUp++; 
            if (landmarks[12].y < landmarks[9].y) fingersUp++; 
            if (landmarks[16].y < landmarks[13].y) fingersUp++; 
            if (landmarks[20].y < landmarks[17].y) fingersUp++; 
            // Simple thumb check (x distance)
            if (Math.abs(landmarks[4].x - landmarks[17].x) > Math.abs(landmarks[3].x - landmarks[17].x)) fingersUp++;

            // Map fingers to shape
            let nextShape = targetShape;
            if (fingersUp === 1) nextShape = 'sphere';
            else if (fingersUp === 2) nextShape = 'spiral';
            else if (fingersUp === 3) nextShape = 'saturn';
            else if (fingersUp === 4) nextShape = 'flower';
            else if (fingersUp === 5) nextShape = 'heart';

            if (nextShape !== targetShape) {
                targetShape = nextShape;
                if(generators[targetShape]) generators[targetShape]();
            }

            // 3. Pinch Detection (Thumb tip 4 vs Index tip 8)
            const dx = landmarks[4].x - landmarks[8].x;
            const dy = landmarks[4].y - landmarks[8].y;
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            // Map distance to expansion: Close = 1.0, Far = 3.0
            // Normal pinch is ~0.02, Open hand ~0.2
            const targetExpansion = THREE.MathUtils.mapLinear(distance, 0.02, 0.3, 0.5, 3.0);
            expansionFactor += (targetExpansion - expansionFactor) * 0.1;

        } else {
            // Idle state if no hand
            expansionFactor += (1.0 - expansionFactor) * 0.05;
        }
    }

    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 320,
        height: 240
    });
    cameraUtils.start();


    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        const time = clock.getElapsedTime();

        // 1. Update Particle Positions (Lerp to target)
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        // Calculate dynamic hue based on hand X position
        hueOffset = handCentroid.x * 0.5; // range 0 to 0.5 hue shift

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const px = posAttr.array[i * 3];
            const py = posAttr.array[i * 3 + 1];
            const pz = posAttr.array[i * 3 + 2];

            const tx = targetPositions[i * 3];
            const ty = targetPositions[i * 3 + 1];
            const tz = targetPositions[i * 3 + 2];

            // Lerp position
            posAttr.array[i * 3] += (tx * expansionFactor - px) * LERP_SPEED;
            posAttr.array[i * 3 + 1] += (ty * expansionFactor - py) * LERP_SPEED;
            posAttr.array[i * 3 + 2] += (tz * expansionFactor - pz) * LERP_SPEED;

            // Update Colors dynamically based on position + hand input
            // Create a gradient based on the Y position and hand input
            const hue = (i / PARTICLE_COUNT + hueOffset + time * 0.1) % 1.0;
            colorObj.setHSL(hue, 0.8, 0.6);
            
            colAttr.array[i * 3] = colorObj.r;
            colAttr.array[i * 3 + 1] = colorObj.g;
            colAttr.array[i * 3 + 2] = colorObj.b;
        }

        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;

        // 2. Rotate System based on hand Y position
        // Map Y (0 top, 1 bottom) to rotation speed
        const rotSpeed = (handCentroid.y - 0.5) * 2.0; 
        particleSystem.rotation.y += 0.005 + (rotSpeed * 0.02);
        particleSystem.rotation.z += 0.002;

        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
